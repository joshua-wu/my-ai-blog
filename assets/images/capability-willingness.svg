<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 430" font-family="sans-serif">
  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">能力-意愿四象限</text>

  <!-- Axes -->
  <line x1="100" y1="380" x2="550" y2="380" stroke="#666" stroke-width="2"/>
  <line x1="100" y1="380" x2="100" y2="55" stroke="#666" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="330" y="415" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">能力 →</text>
  <text x="60" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#555" transform="rotate(-90,60,220)">意愿 →</text>

  <!-- Axis endpoints -->
  <text x="110" y="398" font-size="10" fill="#999">低</text>
  <text x="530" y="398" font-size="10" fill="#999">高</text>
  <text x="82" y="370" font-size="10" fill="#999">低</text>
  <text x="82" y="70" font-size="10" fill="#999">高</text>

  <!-- Quadrant dividers -->
  <line x1="325" y1="60" x2="325" y2="375" stroke="#DDD" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="105" y1="215" x2="545" y2="215" stroke="#DDD" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Q1: High Capability + High Willingness (Top Right) -->
  <rect x="335" y="65" width="205" height="140" rx="10" fill="#4CAF50" opacity="0.12"/>
  <rect x="335" y="65" width="205" height="140" rx="10" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="437" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">高能力 + 高意愿</text>
  <text x="437" y="120" text-anchor="middle" font-size="11" fill="#555">给空间、给资源、不干预</text>
  <text x="437" y="140" text-anchor="middle" font-size="11" fill="#555">你的价值 = 清除障碍</text>
  <text x="437" y="165" text-anchor="middle" font-size="10" fill="#E74C3C">⚠ 最大错误：微管理</text>

  <!-- Q2: Low Capability + High Willingness (Top Left) -->
  <rect x="110" y="65" width="205" height="140" rx="10" fill="#4A90D9" opacity="0.12"/>
  <rect x="110" y="65" width="205" height="140" rx="10" fill="none" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="212" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C6FAC">低能力 + 高意愿</text>
  <text x="212" y="120" text-anchor="middle" font-size="11" fill="#555">投入培养，ROI 最高</text>
  <text x="212" y="140" text-anchor="middle" font-size="11" fill="#555">给足犯错空间 + 及时反馈</text>
  <text x="212" y="165" text-anchor="middle" font-size="10" fill="#E74C3C">⚠ 忌：超出能力的任务</text>

  <!-- Q3: High Capability + Low Willingness (Bottom Right) -->
  <rect x="335" y="225" width="205" height="140" rx="10" fill="#E8913A" opacity="0.12"/>
  <rect x="335" y="225" width="205" height="140" rx="10" fill="none" stroke="#E8913A" stroke-width="1.5"/>
  <text x="437" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#C67A2E">高能力 + 低意愿</text>
  <text x="437" y="280" text-anchor="middle" font-size="11" fill="#555">诊断意愿低的原因</text>
  <text x="437" y="300" text-anchor="middle" font-size="11" fill="#555">激励不足？方向不认同？</text>
  <text x="437" y="325" text-anchor="middle" font-size="10" fill="#E74C3C">⚠ 忌：强行激励</text>

  <!-- Q4: Low Capability + Low Willingness (Bottom Left) -->
  <rect x="110" y="225" width="205" height="140" rx="10" fill="#E74C3C" opacity="0.10"/>
  <rect x="110" y="225" width="205" height="140" rx="10" fill="none" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="212" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#C0392B">低能力 + 低意愿</text>
  <text x="212" y="280" text-anchor="middle" font-size="11" fill="#555">坦诚沟通绩效预期</text>
  <text x="212" y="300" text-anchor="middle" font-size="11" fill="#555">设定改善时间线 (1-2 季度)</text>
  <text x="212" y="325" text-anchor="middle" font-size="10" fill="#E74C3C">⚠ 忌：过度投入精力</text>
</svg>