<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">三层拆解法</title>
  <desc id="desc">将方案拆解为阶段、任务、行动三层，直到行动可估算、可检查。</desc>
  <defs><style>.bg{fill:#f8fafc}.title{font:700 34px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#111827}.h{font:700 22px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#172033}.txt{font:400 15px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#526071}.small{font:400 13px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.card{fill:#fff;stroke:#d7deea;stroke-width:2}.arrow{stroke:#94a3b8;stroke-width:4;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,8 L11,4 z" fill="#94a3b8"/></marker></defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="70" y="74">三层拆解法：从方案到最小行动单元</text>
  <g transform="translate(130 150)">
    <rect class="card" x="0" y="0" width="300" height="300" rx="20"/><circle cx="150" cy="66" r="34" fill="#2563eb"/><text x="140" y="78" font-family="Arial" font-size="32" font-weight="700" fill="#fff">1</text><text class="h" x="108" y="130">阶段</text><text class="txt" x="48" y="170">按时间或逻辑切分为 2-4 个阶段</text><text class="txt" x="48" y="202">每个阶段有独立产出和验收标准</text><text class="small" x="48" y="246">判断：暂停后已完成工作仍有价值</text>
    <path class="arrow" d="M320 150 H420"/>
    <rect class="card" x="450" y="0" width="300" height="300" rx="20"/><circle cx="600" cy="66" r="34" fill="#0f9f6e"/><text x="590" y="78" font-family="Arial" font-size="32" font-weight="700" fill="#fff">2</text><text class="h" x="558" y="130">任务</text><text class="txt" x="498" y="170">每个阶段拆为 3-7 个任务</text><text class="txt" x="498" y="202">负责人、截止时间明确</text><text class="small" x="498" y="246">判断：1-5 个工作日内可完成</text>
    <path class="arrow" d="M770 150 H870"/>
    <rect class="card" x="900" y="0" width="300" height="300" rx="20"/><circle cx="1050" cy="66" r="34" fill="#f59e0b"/><text x="1040" y="78" font-family="Arial" font-size="32" font-weight="700" fill="#fff">3</text><text class="h" x="1008" y="130">行动</text><text class="txt" x="948" y="170">任务拆为具体执行步骤</text><text class="txt" x="948" y="202">每个行动有可验证产出物</text><text class="small" x="948" y="246">判断：半天内完成并可检查</text>
  </g>
  <rect x="300" y="545" width="680" height="62" rx="18" fill="#ecfeff" stroke="#a5f3fc"/>
  <text class="h" x="404" y="584">终止条件：能自信估算行动耗时，且误差不超过 50%</text>
</svg>
