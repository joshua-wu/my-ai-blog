<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" width="750" height="480">
  <defs>
    <style>
      .title { font: bold 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #2c3e50; }
      .subtitle { font: 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #555; }
      .label { font: bold 13px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #2c3e50; }
      .label-sm { font: 12px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #444; }
      .arrow-label { font: 11px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="750" height="480" fill="#fafbfc" rx="12"/>

  <!-- Title -->
  <text x="375" y="35" text-anchor="middle" class="title">口腔吐字发音部位示意图</text>
  <text x="375" y="55" text-anchor="middle" class="subtitle">侧面剖视 &amp; 正面视图 —— 三个"工人"的位置</text>

  <!-- ===== LEFT: Side view (sagittal cross-section) ===== -->
  <g transform="translate(30, 70)">
    <text x="155" y="0" text-anchor="middle" class="label" style="font-size:15px;">侧面剖视图</text>

    <!-- Head outline (simplified) -->
    <path d="M 80,20 C 40,20 20,60 20,120 C 20,180 30,240 60,280 C 80,310 120,330 160,330 C 200,330 240,310 260,270 C 280,240 290,200 290,160 C 290,100 270,50 230,30 C 200,15 140,15 80,20 Z"
          fill="#fef3e2" stroke="#d4a574" stroke-width="1.5"/>

    <!-- Nasal cavity -->
    <path d="M 100,80 C 110,70 150,65 180,70 L 185,90 C 160,85 120,88 100,95 Z"
          fill="#e8d5f5" stroke="#9b59b6" stroke-width="1.2" opacity="0.7"/>
    <text x="145" y="82" text-anchor="middle" class="label-sm" fill="#8e44ad">鼻腔</text>

    <!-- Hard palate (upper jaw/roof) -->
    <path d="M 100,100 C 130,92 170,90 200,95 C 210,97 215,100 215,105"
          fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>

    <!-- Soft palate (velum) -->
    <path d="M 215,105 C 220,115 218,130 210,140 C 205,147 198,150 192,148"
          fill="none" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>

    <!-- Tongue body -->
    <path d="M 105,200 C 110,170 130,150 160,145 C 180,142 200,148 215,160 C 230,172 235,190 230,210 C 225,225 210,235 190,240 C 160,248 125,240 110,225 C 100,215 100,210 105,200 Z"
          fill="#f1948a" stroke="#c0392b" stroke-width="1.5"/>

    <!-- Tongue tip -->
    <ellipse cx="108" cy="185" rx="12" ry="8" fill="#e74c3c" stroke="#a93226" stroke-width="1"/>

    <!-- Lower jaw outline -->
    <path d="M 80,250 C 90,270 120,290 160,295 C 200,298 230,285 250,265"
          fill="none" stroke="#d4a574" stroke-width="2"/>

    <!-- Lips -->
    <path d="M 70,155 C 65,160 62,170 65,180 C 68,190 75,195 80,192"
          fill="#e8a0a0" stroke="#c0392b" stroke-width="1.5"/>
    <path d="M 70,195 C 65,200 63,210 68,218 C 73,225 80,225 85,220"
          fill="#e8a0a0" stroke="#c0392b" stroke-width="1.5"/>

    <!-- Teeth (upper) -->
    <rect x="82" y="150" width="18" height="20" rx="3" fill="#fff" stroke="#bbb" stroke-width="1"/>
    <!-- Teeth (lower) -->
    <rect x="82" y="200" width="18" height="18" rx="3" fill="#fff" stroke="#bbb" stroke-width="1"/>

    <!-- Vocal cords (simple) -->
    <path d="M 210,250 L 220,260 L 210,270" fill="none" stroke="#3498db" stroke-width="2"/>
    <path d="M 230,250 L 220,260 L 230,270" fill="none" stroke="#3498db" stroke-width="2"/>

    <!-- Labels with arrows -->
    <!-- Soft palate label -->
    <line x1="240" y1="120" x2="218" y2="118" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="244" y="118" class="label" fill="#e67e22">软腭</text>
    <text x="244" y="133" class="arrow-label">（上抬打开空间）</text>

    <!-- Hard palate label -->
    <line x1="155" y1="75" x2="155" y2="92" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="155" y="70" text-anchor="middle" class="label" fill="#e74c3c">硬腭</text>

    <!-- Tongue label -->
    <line x1="260" y1="195" x2="235" y2="195" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="263" y="193" class="label" fill="#c0392b">舌体</text>
    <text x="263" y="208" class="arrow-label">（放平不拱起）</text>

    <!-- Tongue tip label -->
    <line x1="90" y1="155" x2="100" y2="175" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="55" y="150" class="label" fill="#a93226">舌尖</text>

    <!-- Lips label -->
    <line x1="35" y1="185" x2="60" y2="185" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="10" y="183" class="label" fill="#c0392b">唇</text>

    <!-- Lower jaw label -->
    <line x1="175" y1="310" x2="175" y2="295" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="175" y="325" text-anchor="middle" class="label" fill="#8B6914">下巴</text>
    <text x="175" y="340" text-anchor="middle" class="arrow-label">（放松下落）</text>

    <!-- Airflow arrow -->
    <path d="M 220,270 C 210,240 180,220 140,210 C 120,205 100,200 75,190"
          fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
    <text x="230" y="285" class="arrow-label" fill="#3498db">气流方向</text>
  </g>

  <!-- ===== RIGHT: Front view ===== -->
  <g transform="translate(440, 70)">
    <text x="140" y="0" text-anchor="middle" class="label" style="font-size:15px;">正面视图（张口时）</text>

    <!-- Face outline -->
    <ellipse cx="140" cy="175" rx="120" ry="150" fill="#fef3e2" stroke="#d4a574" stroke-width="1.5"/>

    <!-- Eyes (simple) -->
    <ellipse cx="100" cy="115" rx="18" ry="10" fill="#fff" stroke="#999" stroke-width="1"/>
    <circle cx="100" cy="115" r="5" fill="#5d4037"/>
    <ellipse cx="180" cy="115" rx="18" ry="10" fill="#fff" stroke="#999" stroke-width="1"/>
    <circle cx="180" cy="115" r="5" fill="#5d4037"/>

    <!-- Nose -->
    <path d="M 135,135 C 130,150 125,160 130,165 C 135,170 145,170 150,165 C 155,160 150,150 145,135"
          fill="none" stroke="#bba58a" stroke-width="1.5"/>

    <!-- Cheek muscles (zygomatic - highlighted) -->
    <ellipse cx="82" cy="160" rx="22" ry="14" fill="#ffcdd2" stroke="#e57373" stroke-width="1" opacity="0.5"/>
    <ellipse cx="198" cy="160" rx="22" ry="14" fill="#ffcdd2" stroke="#e57373" stroke-width="1" opacity="0.5"/>

    <!-- Mouth opening (open position) -->
    <ellipse cx="140" cy="220" rx="42" ry="35" fill="#4a0e0e" stroke="#8B4513" stroke-width="2"/>

    <!-- Upper lip -->
    <path d="M 98,205 C 110,195 125,192 140,194 C 155,192 170,195 182,205"
          fill="#e8a0a0" stroke="#c0392b" stroke-width="2"/>
    <!-- Cupid's bow -->
    <path d="M 125,194 C 130,190 135,189 140,191 C 145,189 150,190 155,194"
          fill="#d4817a" stroke="none"/>

    <!-- Lower lip -->
    <path d="M 98,235 C 110,250 125,255 140,256 C 155,255 170,250 182,235"
          fill="#e8a0a0" stroke="#c0392b" stroke-width="2"/>

    <!-- Teeth upper row -->
    <rect x="108" y="205" width="10" height="12" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.8"/>
    <rect x="119" y="204" width="10" height="13" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.8"/>
    <rect x="130" y="203" width="10" height="13" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.8"/>
    <rect x="141" y="203" width="10" height="13" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.8"/>
    <rect x="152" y="204" width="10" height="13" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.8"/>
    <rect x="163" y="205" width="10" height="12" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.8"/>

    <!-- Tongue visible in mouth -->
    <ellipse cx="140" cy="235" rx="30" ry="12" fill="#f1948a" stroke="#c0392b" stroke-width="1.2"/>

    <!-- Uvula hint -->
    <ellipse cx="140" cy="210" rx="5" ry="8" fill="#d4817a" stroke="#a04040" stroke-width="0.8"/>

    <!-- Labels -->
    <!-- Cheek/zygomatic label -->
    <line x1="50" y1="145" x2="65" y2="155" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="10" y="138" class="label" fill="#e57373">颧肌</text>
    <text x="4" y="153" class="arrow-label">（上提打开口腔）</text>

    <!-- Upper lip label -->
    <line x1="210" y1="195" x2="185" y2="198" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="213" y="193" class="label" fill="#c0392b">上唇</text>

    <!-- Lower lip label -->
    <line x1="210" y1="248" x2="185" y2="245" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="213" y="250" class="label" fill="#c0392b">下唇</text>

    <!-- Tongue label -->
    <line x1="185" y1="232" x2="172" y2="233" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="188" y="230" class="label" fill="#c0392b">舌面</text>

    <!-- Jaw movement arrow -->
    <path d="M 140,265 L 140,290" stroke="#8B6914" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="140" y="308" text-anchor="middle" class="label" fill="#8B6914">下巴放松下落</text>

    <!-- Cheek lift arrows -->
    <path d="M 82,148 L 82,135" stroke="#e57373" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <path d="M 198,148 L 198,135" stroke="#e57373" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ===== BOTTOM: Legend ===== -->
  <g transform="translate(30, 440)">
    <rect x="0" y="0" width="690" height="32" rx="6" fill="#f0f4f8" stroke="#dde3ea" stroke-width="1"/>
    <circle cx="20" cy="16" r="7" fill="#e74c3c" opacity="0.7"/>
    <text x="33" y="20" class="label-sm">嘴唇 / 硬腭</text>
    <circle cx="140" cy="16" r="7" fill="#e67e22" opacity="0.7"/>
    <text x="153" y="20" class="label-sm">软腭（可上抬）</text>
    <circle cx="285" cy="16" r="7" fill="#f1948a"/>
    <text x="298" y="20" class="label-sm">舌头（最灵活部件）</text>
    <circle cx="445" cy="16" r="7" fill="#e57373" opacity="0.5"/>
    <text x="458" y="20" class="label-sm">颧肌（带动口腔打开）</text>
    <rect x="598" y="10" width="20" height="3" fill="#3498db"/>
    <text x="623" y="20" class="label-sm">气流</text>
  </g>
</svg>
