<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#B3D9F2"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980B9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1A5276" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">冰山解耦法则</text>

  <!-- Sky background -->
  <rect x="0" y="40" width="600" height="130" fill="url(#sky)"/>

  <!-- Water background -->
  <rect x="0" y="170" width="600" height="250" fill="url(#water)"/>

  <!-- Water line -->
  <line x1="0" y1="170" x2="600" y2="170" stroke="#2980B9" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="25" y="165" font-size="11" fill="#2980B9" font-weight="bold">▲ 可见</text>
  <text x="25" y="185" font-size="11" fill="#fff" font-weight="bold">▼ 不可见</text>

  <!-- Iceberg above water -->
  <polygon points="300,55 230,165 370,165" fill="#D5E8F0" stroke="#8BB8D0" stroke-width="1.5"/>

  <!-- Iceberg below water -->
  <polygon points="230,175 370,175 420,280 380,370 220,370 180,280" fill="#A8C8DC" stroke="#7BA8C2" stroke-width="1.5" opacity="0.85"/>

  <!-- Above water labels -->
  <text x="300" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">言语</text>
  <text x="300" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">行动</text>
  <text x="300" y="148" text-anchor="middle" font-size="10" fill="#5D6D7E">可以确信地描述</text>

  <!-- Right side annotation - above -->
  <rect x="420" y="85" width="155" height="55" rx="8" fill="#fff" stroke="#8BB8D0" stroke-width="1"/>
  <text x="497" y="105" text-anchor="middle" font-size="11" fill="#2C3E50">「他反对了这个方案」</text>
  <text x="497" y="123" text-anchor="middle" font-size="10" fill="#4A90D9" font-weight="bold">→ 事实，可验证</text>
  <line x1="420" y1="112" x2="372" y2="120" stroke="#8BB8D0" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Below water labels -->
  <text x="300" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">情绪</text>
  <text x="300" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">立场 · 利益</text>
  <text x="300" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#E8F0FE">价值观</text>
  <text x="300" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#E8F0FE">深层动机</text>
  <text x="300" y="345" text-anchor="middle" font-size="10" fill="#B3D9F2">只能推测，需要数据验证</text>

  <!-- Right side annotation - below -->
  <rect x="430" y="230" width="155" height="55" rx="8" fill="rgba(255,255,255,0.15)" stroke="#fff" stroke-width="1"/>
  <text x="507" y="250" text-anchor="middle" font-size="11" fill="#fff">「他出于嫉妒反对」</text>
  <text x="507" y="268" text-anchor="middle" font-size="10" fill="#F9E79F" font-weight="bold">→ 假设，需验证</text>
  <line x1="430" y1="257" x2="380" y2="250" stroke="#fff" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- Warning -->
  <text x="300" y="405" text-anchor="middle" font-size="11" fill="#D4E6F1">⚠ 行为与动机混为一谈 → 故事化陷阱 → 预言自我实现</text>
</svg>