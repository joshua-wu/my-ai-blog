<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">问题解决六步闭环</title>
  <desc id="desc">识别定义、分析诊断、方案决策、执行推进、监控纠偏、复盘迭代构成反馈闭环。</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:700 36px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#111827}.sub{font:400 17px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.step{font:700 21px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#111827}.body{font:400 15px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.num{font:700 28px Arial,sans-serif;fill:#fff}.card{fill:#fff;stroke:#d9e2ef;stroke-width:2}.arrow{stroke:#94a3b8;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="70" y="78">问题解决六步闭环</text>
  <text class="sub" x="70" y="112">每一步都有明确问题、动作和产出；复盘结果回流到下一轮问题定义。</text>

  <path class="arrow" d="M382 202 C500 112 780 112 898 202"/>
  <path class="arrow" d="M1000 298 C1060 390 1060 504 1000 596"/>
  <path class="arrow" d="M898 648 C780 734 500 734 382 648"/>
  <path class="arrow" d="M280 596 C220 504 220 390 280 298"/>
  <path class="arrow" d="M386 424 H894"/>

  <g transform="translate(178 174)">
    <rect class="card" width="234" height="126" rx="18"/>
    <circle cx="42" cy="42" r="24" fill="#2563eb"/><text class="num" x="34" y="52">1</text>
    <text class="step" x="82" y="48">识别与定义</text>
    <text class="body" x="28" y="86">真正的问题是什么？</text>
    <text class="body" x="28" y="110">成功标准如何量化？</text>
  </g>
  <g transform="translate(523 124)">
    <rect class="card" width="234" height="126" rx="18"/>
    <circle cx="42" cy="42" r="24" fill="#0f9f6e"/><text class="num" x="34" y="52">2</text>
    <text class="step" x="82" y="48">分析与诊断</text>
    <text class="body" x="28" y="86">根因是什么？</text>
    <text class="body" x="28" y="110">证据是否充分？</text>
  </g>
  <g transform="translate(868 174)">
    <rect class="card" width="234" height="126" rx="18"/>
    <circle cx="42" cy="42" r="24" fill="#f59e0b"/><text class="num" x="34" y="52">3</text>
    <text class="step" x="82" y="48">方案与决策</text>
    <text class="body" x="28" y="86">有哪些可选方案？</text>
    <text class="body" x="28" y="110">风险是否可控？</text>
  </g>
  <g transform="translate(868 546)">
    <rect class="card" width="234" height="126" rx="18"/>
    <circle cx="42" cy="42" r="24" fill="#ef4444"/><text class="num" x="34" y="52">4</text>
    <text class="step" x="82" y="48">执行与推进</text>
    <text class="body" x="28" y="86">谁在何时交付什么？</text>
    <text class="body" x="28" y="110">里程碑如何验收？</text>
  </g>
  <g transform="translate(523 596)">
    <rect class="card" width="234" height="126" rx="18"/>
    <circle cx="42" cy="42" r="24" fill="#7c3aed"/><text class="num" x="34" y="52">5</text>
    <text class="step" x="82" y="48">监控与纠偏</text>
    <text class="body" x="28" y="86">是否偏离预期？</text>
    <text class="body" x="28" y="110">何时升级处理？</text>
  </g>
  <g transform="translate(178 546)">
    <rect class="card" width="234" height="126" rx="18"/>
    <circle cx="42" cy="42" r="24" fill="#0891b2"/><text class="num" x="34" y="52">6</text>
    <text class="step" x="82" y="48">复盘与迭代</text>
    <text class="body" x="28" y="86">预期和实际差在哪？</text>
    <text class="body" x="28" y="110">方法论如何更新？</text>
  </g>
  <rect x="452" y="350" width="376" height="94" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="step" x="544" y="390">闭环核心产出</text>
  <text class="body" x="490" y="422">问题定义、根因证据、决策记录、执行计划、纠偏动作、复盘资产</text>
</svg>
