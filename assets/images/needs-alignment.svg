<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B6ABF"/>
      <stop offset="100%" stop-color="#4A5AAF"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#3A80C9"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BAED6"/>
      <stop offset="100%" stop-color="#5B9EC6"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">需求对齐框架 Needs Alignment</text>

  <!-- Pyramid Layer 1 (Top) - 组织层 -->
  <polygon points="300,60 200,155 400,155" fill="url(#g1)" stroke="#4A5090" stroke-width="1.5"/>
  <text x="300" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">组织层需求</text>
  <text x="300" y="128" text-anchor="middle" font-size="10" fill="#D0D5F0">向上交付什么？KPI是什么？</text>

  <!-- Pyramid Layer 2 (Middle) - 团队层 -->
  <polygon points="200,160 140,255 460,255 400,160" fill="url(#g2)" stroke="#3A70A0" stroke-width="1.5"/>
  <text x="300" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">团队层需求</text>
  <text x="300" y="223" text-anchor="middle" font-size="10" fill="#C5DCFA">效率？质量？创新？稳定？</text>

  <!-- Pyramid Layer 3 (Bottom) - 个人层 -->
  <polygon points="140,260 80,355 520,355 460,260" fill="url(#g3)" stroke="#4B8EB0" stroke-width="1.5"/>
  <text x="300" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">个人层需求</text>
  <text x="300" y="318" text-anchor="middle" font-size="10" fill="#E0EFF8">专业声望？管理地位？工作生活平衡？</text>

  <!-- Right side annotations -->
  <!-- Level 1 -->
  <rect x="430" y="80" width="150" height="50" rx="8" fill="#F0EFF5" stroke="#5B6ABF" stroke-width="1"/>
  <text x="505" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B6ABF">合作者视角</text>
  <text x="505" y="116" text-anchor="middle" font-size="10" fill="#666">帮他解决问题</text>
  <line x1="430" y1="105" x2="402" y2="115" stroke="#5B6ABF" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Level 2 -->
  <rect x="470" y="180" width="120" height="50" rx="8" fill="#EBF3FA" stroke="#4A90D9" stroke-width="1"/>
  <text x="530" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A90D9">执行者视角</text>
  <text x="530" y="216" text-anchor="middle" font-size="10" fill="#666">完成任务</text>
  <line x1="470" y1="205" x2="455" y2="210" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Level 3 -->
  <rect x="430" y="285" width="150" height="50" rx="8" fill="#E8F4F8" stroke="#6BAED6" stroke-width="1"/>
  <text x="505" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A90D9">信任者视角</text>
  <text x="505" y="321" text-anchor="middle" font-size="10" fill="#666">建立深层信任</text>
  <line x1="430" y1="310" x2="410" y2="310" stroke="#6BAED6" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Left side - rarity indicator -->
  <text x="45" y="115" text-anchor="middle" font-size="10" fill="#5B6ABF">少数人</text>
  <text x="45" y="210" text-anchor="middle" font-size="10" fill="#4A90D9">多数人</text>
  <text x="45" y="310" text-anchor="middle" font-size="10" fill="#6BAED6">极少数</text>
  <line x1="45" y1="130" x2="45" y2="195" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Footer -->
  <text x="300" y="385" text-anchor="middle" font-size="11" fill="#999">三层都对齐的下属极为稀少，这正是差异化竞争力</text>
</svg>